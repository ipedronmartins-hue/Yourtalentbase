<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Gestor · YourTalentBase</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        .sidebar { width: 260px; background: #111; height: 100vh; padding: 25px; border-right: 1px solid #333; position: fixed; }
        .main { margin-left: 280px; padding: 40px; }
        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .tag-fut { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #004d40; color: #fff; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .nav-link { display: block; padding: 12px; color: #888; text-decoration: none; border-radius: 6px; cursor: pointer; }
        .nav-link.active { background: #D4AF37; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:#D4AF37; margin-bottom: 30px;">GESTOR</h2>
        <div class="nav-link active" onclick="tab('adm')">📁 Secretaria</div>
        <div class="nav-link" onclick="tab('desp')">⚽ Desportivo</div>
        <a href="index.html" class="nav-link" style="margin-top: 40px; border: 1px solid #333; text-align: center;">🏠 Sair para o Hub</a>
    </div>

    <div class="main">
        <div id="adm" class="tab-content">
            <h1>Insights da Secretaria</h1>
            <div class="stat-grid">
                <div class="card"><h2 style="color:#D4AF37; margin:0;">476</h2><p style="margin:5px 0 0 0;">Total de Inscrições</p></div>
                <div class="card"><h2 style="color:#D4AF37; margin:0;">378</h2><p style="margin:5px 0 0 0;">Atletas Ativos</p></div>
            </div>
        </div>

        <div id="desp" class="tab-content" style="display:none;">
            <h1>Gestão Desportiva</h1>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0;">Infantis Sub-12.1 (Masc)</h3>
                    <span class="tag-fut">FUTEBOL 11</span>
                </div>
                <p style="color:#888;">Campo: Estádio São Miguel (Sintético)</p>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <h4>Microciclo Semanal</h4>
                <p>Treinos: Segunda, Quarta, Sexta (19:00 - 20:30)</p>
            </div>
        </div>
    </div>

    <script>
        function tab(name) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(name).style.display = 'block';
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
