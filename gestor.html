<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor · YourTalentBase</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: #111; border-right: 1px solid #333; padding: 20px; flex-shrink: 0; }
        .main { flex-grow: 1; padding: 40px; }
        .card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h1, h2 { color: #D4AF37; margin-top: 0; }
        .nav-btn { display: block; padding: 12px; color: #ccc; text-decoration: none; cursor: pointer; border-radius: 4px; margin-bottom: 5px; }
        .nav-btn:hover, .nav-btn.active { background: #D4AF37; color: #000; font-weight: bold; }
        .tag { background: #004d40; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>GESTOR</h2>
        <div class="nav-btn active" onclick="showTab('adm')">📁 Secretaria</div>
        <div class="nav-btn" onclick="showTab('desp')">⚽ Desportivo</div>
        <a href="index.html" class="nav-btn" style="margin-top: 30px; border: 1px solid #444; text-align: center;">🏠 Sair</a>
    </div>

    <div class="main">
        <div id="adm" class="tab-content active">
            <h1>Secretaria</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card"><h2>476</h2><p>Inscrições</p></div>
                <div class="card"><h2>378</h2><p>Ativos</p></div>
            </div>
        </div>

        <div id="desp" class="tab-content">
            <h1>Mapa Desportivo</h1>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Infantis Sub-12</h3>
                    <span class="tag">FUTEBOL 11</span>
                </div>
                <p>Treinos: 2ª, 4ª e 6ª às 19:00</p>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
