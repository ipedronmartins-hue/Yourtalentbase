<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourTalentBase · Ecossistema de Futebol</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        body { background: #050505; color: #fff; margin: 0; overflow: hidden; font-family: 'Barlow', sans-serif; height: 100vh; }
        .network-wrap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hub-center {
            width: 210px; height: 210px; background: #D4AF37; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: #000; font-weight: 900; z-index: 10;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); border: 4px solid #fff;
        }
        .node {
            position: absolute; padding: 14px 22px; background: rgba(255,255,255,0.05);
            border: 1px solid #333; border-radius: 50px; color: #fff; text-decoration: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 600; font-size: 0.9rem;
        }
        .node:hover { background: #D4AF37; color: #000; transform: scale(1.15); box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        
        /* Posicionamento em volta do centro */
        .n1 { transform: translate(0, -270px); }    /* Gestor */
        .n2 { transform: translate(250px, -150px); } /* Scout Report */
        .n3 { transform: translate(250px, 150px); }  /* TacticsLab */
        .n4 { transform: translate(0, 270px); }      /* Treino Extra */
        .n5 { transform: translate(-250px, 150px); } /* Base de Dados */
        .n6 { transform: translate(-250px, -150px); }/* Representação */
        .n7 { transform: translate(0, 110px); }      /* Torneios */

        .slogan { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #666; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="network-wrap">
        <div class="hub-center">
            <small style="font-size: 10px; letter-spacing: 1px;">PORTAL</small><br>
            YOURTALENTBASE.PT
        </div>
        
        <a href="gestor.html" class="node n1">📊 GESTOR</a>
        <a href="scout-report.html" class="node n2">🔍 SCOUT REPORT</a>
        <a href="tacticslab.html" class="node n3">📋 TACTICSLAB</a>
        <a href="treino.html" class="node n4">⚽ TREINO EXTRA</a>
        <a href="database.html" class="node n5">🗂️ BASE DE DADOS</a>
        <a href="representacao.html" class="node n6">🤝 REPRESENTAÇÃO</a>
        <a href="torneios.html" class="node n7">🏆 TORNEIOS</a>
    </div>
    <div class="slogan">O mais completo ecossistema de futebol</div>
</body>
</html>
